<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>raga.fm — live</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      canvas { display: block; }

      /* small play control — never blocks the visual */
      #play {
        position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
        z-index: 30; display: inline-flex; align-items: center; gap: 9px;
        padding: 11px 20px; border-radius: 999px;
        background: rgba(20,20,20,0.45); color: #f4f4f4;
        border: 1px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
        cursor: default; opacity: 0.65; transition: opacity 0.5s ease, background 0.2s ease;
      }
      #play.ready { cursor: pointer; opacity: 1; }
      #play.ready:hover { background: rgba(40,40,40,0.6); }
      #play.gone { opacity: 0; pointer-events: none; }
      #play .ring {
        width: 13px; height: 13px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.3); border-top-color: #ffd166;
        animation: spin 0.9s linear infinite;
      }
      #play.ready .ring { display: none; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- small control; the p5 visual renders behind it immediately -->
    <button id="play" type="button" disabled>
      <span class="ring"></span><span id="playLabel">loading samples…</span>
    </button>

    <script>
      // random hash on every load → a different raga each time.
      function randomHash() {
        const b = new Uint8Array(32);
        crypto.getRandomValues(b);
        return "0x" + Array.from(b).map((x) => x.toString(16).padStart(2, "0")).join("");
      }
      window.tokenData = {
        hash: randomHash(),
        tokenId: "0000000",
        // dependencyType 2 = local: tone.js + samples load from this folder, no IPFS
        externalAssetDependencies: [{ dependencyType: 2, data: "" }],
      };

      const btn = document.getElementById("play");
      const label = document.getElementById("playLabel");
      let started = false;

      // enable play once the samples have decoded (raga-fm sets window.__ragaReady)
      const t0 = Date.now();
      const poll = setInterval(() => {
        if (window.__ragaReady) {
          btn.disabled = false;
          btn.classList.add("ready");
          label.textContent = "▶ Play raga";
          clearInterval(poll);
        } else if (Date.now() - t0 > 30000) {
          // safety: let them try even if the ready flag never arrives
          btn.disabled = false;
          btn.classList.add("ready");
          label.textContent = "▶ Play raga";
          clearInterval(poll);
        }
      }, 250);

      btn.addEventListener("click", () => {
        if (started || btn.disabled) return;
        started = true;
        // raga-fm starts audio on the window click; this click bubbles up to it
        btn.classList.add("gone");
      });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="raga-fm.js?v=2"></script>
  </body>
</html>
