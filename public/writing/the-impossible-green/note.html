<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KALA — the note</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent}
  body{color:#111110;font-family:ui-monospace,'JetBrains Mono','Courier New',monospace;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100vh;padding:8px 12px 20px;gap:0;-webkit-font-smoothing:antialiased}

  /* the note itself — black on warm white, a printed object resting on the page */
  #stage{background:#fdfbf3;box-shadow:0 24px 60px -28px rgba(17,17,16,.45),0 2px 8px -4px rgba(17,17,16,.3);}
  canvas{display:block;width:100%;height:auto}

  /* caption strip beneath the note */
  .cap{width:100%;max-width:760px;margin-top:16px;display:flex;justify-content:space-between;
       align-items:center;gap:12px;flex-wrap:wrap;
       font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(17,17,16,.55)}
  .cap b{color:#111110;font-weight:400}
  .cap .val{color:#db261f}

  #mint{background:none;border:1px solid rgba(17,17,16,.28);color:#111110;
        padding:10px 16px;font-family:inherit;font-size:10px;letter-spacing:.18em;
        text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
        transition:background .3s cubic-bezier(.16,1,.3,1),color .3s,border-color .3s}
  #mint:hover{background:#111110;color:#fdfbf3;border-color:#111110}
  #mint:active{transform:translateY(1px)}
  #mint .arw{transition:transform .5s cubic-bezier(.16,1,.3,1)}
  #mint:hover .arw{transform:rotate(-180deg)}

  #stagewrap{width:100%;max-width:760px;position:relative}
  #status{font-size:8px;color:rgba(17,17,16,.32);letter-spacing:.14em;height:11px;margin-top:9px;text-align:center;width:100%}
</style>

<script>
/* ================================================================
   KALA — plotter money press  ·  BLACK on WHITE
   engine: RIDDLE (nested WFC) · single 0.5mm pen · all marks are strokes
   value(note) = density(recursion) × symmetry ; batch of six = the matrix
   units: MILLIMETRES (SVG exports 1 user-unit = 1 mm)
================================================================ */
const INK='#111111', PAPER='#ffffff', INK_SVG='#000000';

/* ---- note = thin banknote 2.26:1 ---- */
const NW=194, NH=86;
const FX=6, FY=7, FW=182, FH=70;                // bare face — field 7..77, a clear margin below for the value
const LOGO={cx:97, cy:42, rx:18, ry:10, w:18};  // WFC opens this void; centred on the field
/* pen is selectable: 0.5 / 1 / 3 mm — the weave rescales around the nib.
   minCell keeps parallel strokes from merging; penCols coarsens the grid for fat nibs. */
let PEN=0.5;
const SUB_N=[3,3];
const minCell=()=>Math.max(1.6,PEN*2.2);
const penCols=()=>PEN<=0.6?20:PEN<=1.2?14:8;
const BORDER=3;   // frame inset from the cut edge — hides hand-cut wobble

/* ---- A3 sheet (landscape) : 6 notes butt-jointed 2 x 3 — every cut is one full line ---- */
const SHEET_W=420, SHEET_H=297, COLS=2, ROWS=3;
const MX=(SHEET_W-COLS*NW)/2, MY=(SHEET_H-ROWS*NH)/2;
function slot(i){const c=i%COLS,r=Math.floor(i/COLS);return{ox:MX+c*NW,oy:MY+r*NH};}

/* ---- the value matrix : 2 densities × 3 symmetries = 6 ---- */
const DENS=[
  {tag:'I',  maxDepth:1, subdivide:0.60, blankW:5},   // recursion i  — sparse
  {tag:'II', maxDepth:2, subdivide:1.15, blankW:3},    // recursion ii — dense
];
const SYM=['none','half','full'];
function matrix(){const m=[];for(const d of DENS)for(const s of SYM)m.push({...d,symmetry:s});return m;}

let P={maxDepth:2,subdivide:1.0,blankW:4,decay:0.55,cols:20};

/* ================================================================
   SINGLE-STROKE FONT (centre-line geometric)
================================================================ */

 'C':{w:5,s:[[4.6,1.4,3.4,.3,1.6,.3,.5,1.5,.2,3.5,.5,5.5,1.6,6.7,3.4,6.7,4.6,5.6]]},'D':{w:5,s:[[0,0,0,7],[0,0,3,0,4.6,1.6,4.6,5.4,3,7,0,7]]},
 'E':{w:5,s:[[0,0,0,7],[0,0,4.4,0],[0,3.5,3.4,3.5],[0,7,4.4,7]]},'F':{w:5,s:[[0,0,0,7],[0,0,4.4,0],[0,3.5,3.2,3.5]]},
 'G':{w:5,s:[[4.6,1.4,3.4,.3,1.6,.3,.5,1.5,.2,3.5,.5,5.5,1.6,6.7,3.4,6.7,4.6,5.6,4.6,4.2,2.8,4.2]]},'H':{w:5,s:[[0,0,0,7],[5,0,5,7],[0,3.5,5,3.5]]},
 'I':{w:4,s:[[1,0,3,0],[2,0,2,7],[1,7,3,7]]},'J':{w:5,s:[[3.6,0,3.6,5.4,2.9,6.8,1.4,7,.4,6.1,.1,5]]},
 'K':{w:5,s:[[0,0,0,7],[5,0,.2,3.8],[1.7,2.6,5,7]]},'L':{w:5,s:[[0,0,0,7],[0,7,4.4,7]]},
 'M':{w:6,s:[[0,7,0,0,3,4.2,6,0,6,7]]},'N':{w:5,s:[[0,7,0,0,5,7,5,0]]},
 'O':{w:5,s:[[2.5,0,1,.5,.2,2,.2,5,1,6.5,2.5,7,4,6.5,4.8,5,4.8,2,4,.5,2.5,0]]},'P':{w:5,s:[[0,7,0,0,3.6,0,4.5,.8,4.5,2.7,3.6,3.5,0,3.5]]},
 'Q':{w:5,s:[[2.5,0,1,.5,.2,2,.2,5,1,6.5,2.5,7,4,6.5,4.8,5,4.8,2,4,.5,2.5,0],[3,5.2,5,7.3]]},'R':{w:5,s:[[0,7,0,0,3.6,0,4.5,.8,4.5,2.7,3.6,3.5,0,3.5],[2.2,3.5,4.8,7]]},
 'S':{w:5,s:[[4.4,1.2,3.2,.2,1.4,.2,.4,1.2,.4,2.8,1.4,3.4,3.4,3.6,4.4,4.3,4.4,5.9,3.4,6.8,1.4,6.8,.2,5.8]]},'T':{w:5,s:[[0,0,5,0],[2.5,0,2.5,7]]},
 'U':{w:5,s:[[0,0,0,5,1,6.7,2.5,7,4,6.7,5,5,5,0]]},'V':{w:5,s:[[0,0,2.5,7,5,0]]},
 'W':{w:6,s:[[0,0,1.4,7,3,2.6,4.6,7,6,0]]},'X':{w:5,s:[[0,0,5,7],[5,0,0,7]]},

 '0':{w:4.6,s:[[2.3,0,.9,.5,.2,2,.2,5,.9,6.5,2.3,7,3.7,6.5,4.4,5,4.4,2,3.7,.5,2.3,0]]},'1':{w:4.6,s:[[1,1.6,2.5,0,2.5,7],[1,7,4,7]]},
 '2':{w:4.6,s:[[.3,1.5,1.6,.2,3.3,.2,4.4,1.4,4.4,2.8,.3,7,4.5,7]]},'3':{w:4.6,s:[[.3,1,1.7,.2,3.4,.2,4.4,1.2,4.4,2.6,3,3.5,4.4,4.4,4.4,5.9,3.4,6.8,1.6,6.8,.3,6]]},
 '4':{w:4.6,s:[[3.4,7,3.4,0,.2,4.9,4.6,4.9]]},'5':{w:4.6,s:[[4.3,.2,.6,.2,.4,3,1.9,2.6,3.5,2.9,4.4,3.9,4.4,5.7,3.4,6.8,1.6,6.9,.3,6]]},

 '8':{w:4.6,s:[[2.3,3.4,1,2.9,.6,1.7,1.4,.4,2.3,.2,3.3,.4,4,1.7,3.6,2.9,2.3,3.4,1,4,.5,5.4,1.4,6.8,2.3,6.9,3.3,6.8,4.2,5.4,3.6,4,2.3,3.4]]},'9':{w:4.6,s:[[.6,6,1.9,6.8,3.3,6.4,4.2,5,4.4,2.4,4.4,1.4,3.5,.3,1.9,.2,.8,.9,.5,2,1,3.2,2.4,3.6,3.8,3.2,4.3,2]]},
 '.':{w:2.4,s:[[1.1,6.6,1.1,7]]},',':{w:2.4,s:[[1.2,6.5,1.2,7,.6,7.8]]},':':{w:2.4,s:[[1.1,2.6,1.1,3],[1.1,5,1.1,5.4]]},
 '-':{w:3.6,s:[[.4,3.7,3.1,3.7]]},'/':{w:3.2,s:[[0,7,3.2,0]]},'·':{w:2.4,s:[[1,3.7,1,4.1]]},
};
function up(s){return s.toUpperCase();}
function measure(str,h,tr){const k=h/7;let w=0;for(const ch of up(str)){const g=F[ch]||F[' '];w+=g.w*k+tr;}return w-tr;}
function penText(sink,str,x,y,h,tr,anchor){
  const k=h/7,total=measure(str,h,tr);
  let cx=anchor==='mid'?x-total/2:anchor==='end'?x-total:x;
  for(const ch of up(str)){const g=F[ch]||F[' '];
    for(const st of g.s){const pts=[];for(let i=0;i<st.length;i+=2)pts.push([cx+st[i]*k,y+st[i+1]*k]);sink.push({pts});}
    cx+=g.w*k+tr;}
}

/* ================================================================
   RIDDLE engine (nested WFC)
================================================================ */
const TILES=[
 {e:[0,0,0,0],wBase:5,c:0},{e:[1,1,1,1],wBase:1,c:4},
 {e:[0,1,0,1],wBase:3,c:2},{e:[1,0,1,0],wBase:3,c:2},
 {e:[1,1,0,0],wBase:2,c:2},{e:[0,1,1,0],wBase:2,c:2},
 {e:[0,0,1,1],wBase:2,c:2},{e:[1,0,0,1],wBase:2,c:2},
 {e:[1,1,1,0],wBase:1,c:3},{e:[1,1,0,1],wBase:1,c:3},
 {e:[0,1,1,1],wBase:1,c:3},{e:[1,0,1,1],wBase:1,c:3},
 {e:[0,0,0,0],wBase:1,c:0,dot:true},
];
function tileWeights(){return TILES.map((t,i)=>i===0?P.blankW:t.wBase);}
function runWFC(rows,cols,parentEdges,forceBlank){
  const wts=tileWeights(),total=rows*cols;
  const wave=Array.from({length:total},()=>new Set(TILES.map((_,i)=>i)));
  const idx=(r,c)=>r*cols+c,toRC=i=>[Math.floor(i/cols),i%cols];
  function clampEdge(wi,ei,req){for(const t of[...wave[wi]])if(TILES[t].e[ei]!==req)wave[wi].delete(t);if(!wave[wi].size)wave[wi].add(0);}
  function propagate(stack){while(stack.length){const cur=stack.pop();const[r,c]=toRC(cur);
    for(const[dr,dc,myE,thE]of[[-1,0,0,2],[0,1,1,3],[1,0,2,0],[0,-1,3,1]]){
      const nr=r+dr,nc=c+dc;if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
      const ni=idx(nr,nc);if(wave[ni].size<=1)continue;
      const my=new Set();for(const t of wave[cur])my.add(TILES[t].e[myE]);
      const b=wave[ni].size;for(const t of[...wave[ni]])if(!my.has(TILES[t].e[thE]))wave[ni].delete(t);
      if(!wave[ni].size)wave[ni].add(0);if(wave[ni].size<b)stack.push(ni);}}}
  if(forceBlank){const seeds=[];
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(forceBlank(r,c)){wave[idx(r,c)]=new Set([0]);seeds.push(idx(r,c));}
    propagate(seeds);}
  if(parentEdges){const seeds=[];
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const wi=idx(r,c);let s=false;
      if(r===0){clampEdge(wi,0,parentEdges[0]);s=true;}
      if(c===cols-1){clampEdge(wi,1,parentEdges[1]);s=true;}
      if(r===rows-1){clampEdge(wi,2,parentEdges[2]);s=true;}
      if(c===0){clampEdge(wi,3,parentEdges[3]);s=true;}
      if(s)seeds.push(wi);}
    propagate(seeds);}
  for(let it=0;it<total;it++){let mE=Infinity,mI=-1;
    for(let i=0;i<total;i++){if(wave[i].size<=1)continue;const e=wave[i].size+Math.random()*.01;if(e<mE){mE=e;mI=i;}}
    if(mI===-1)break;const opts=[...wave[mI]],ws=opts.map(t=>wts[t]);
    let rv=Math.random()*ws.reduce((a,b)=>a+b,0),ch=opts[opts.length-1];
    for(let k=0;k<opts.length;k++){rv-=ws[k];if(rv<=0){ch=opts[k];break;}}
    wave[mI]=new Set([ch]);propagate([mI]);}
  const g=[];for(let r=0;r<rows;r++){g[r]=[];for(let c=0;c<cols;c++){const s=wave[idx(r,c)];g[r][c]=s.size?[...s][0]:0;}}
  return g;
}
/* corner rendering: quarter-arcs (lace / guilloche) vs straight elbows (circuit).
   arcs keep the exact same edge contract, so the WFC grammar is untouched. */
let ARCS=true;
function arcCorner(x,y,w,h,which){
  const C={tr:[x+w,y,Math.PI,Math.PI/2],tl:[x,y,0,Math.PI/2],
           br:[x+w,y+h,Math.PI,3*Math.PI/2],bl:[x,y+h,0,-Math.PI/2]}[which];
  const [cx,cy,a0,a1]=C,rx=w/2,ry=h/2,N=8,pts=[];
  for(let i=0;i<=N;i++){const t=a0+(a1-a0)*i/N;pts.push([cx+rx*Math.cos(t),cy+ry*Math.sin(t)]);}
  return {pts};
}
function emit(sink,ti,x,y,w,h){
  const t=TILES[ti];
  if(t.dot){const cx=x+w/2,cy=y+h/2,d=Math.min(w,h)*.14;sink.push({pts:[[cx-d,cy],[cx+d,cy]]});sink.push({pts:[[cx,cy-d],[cx,cy+d]]});return;}
  const e=t.e,pts=[[x+w/2,y],[x+w,y+h/2],[x+w/2,y+h],[x,y+h/2]],cx=x+w/2,cy=y+h/2;
  const act=[0,1,2,3].filter(i=>e[i]);if(!act.length)return;
  const opp=(a,b)=>(a+2)%4===b;
  if(act.length===4){sink.push({pts:[pts[0],pts[2]]});sink.push({pts:[pts[1],pts[3]]});return;}
  if(act.length===2&&opp(act[0],act[1])){sink.push({pts:[pts[act[0]],pts[act[1]]]});return;}
  if(act.length===2){
    if(ARCS){
      const k=(act[0]===0&&act[1]===1)?'tr':(act[0]===1&&act[1]===2)?'br':(act[0]===2&&act[1]===3)?'bl':'tl';
      sink.push(arcCorner(x,y,w,h,k));return;
    }
    for(const i of act)sink.push({pts:[[cx,cy],pts[i]]});return;
  }
  if(act.length===3){for(let i=0;i<3;i++)for(let j=i+1;j<3;j++)if(opp(act[i],act[j])){
    sink.push({pts:[pts[act[i]],pts[act[j]]]});const arm=act.find((_,k)=>k!==i&&k!==j);sink.push({pts:[[cx,cy],pts[arm]]});return;}}
  for(const i of act)sink.push({pts:[[cx,cy],pts[i]]});
}
function shouldSub(ti,depth,w,h){
  if(depth>=P.maxDepth)return false;const t=TILES[ti];if(t.dot||t.c===0)return false;
  if(Math.min(w,h)/SUB_N[Math.min(depth,SUB_N.length-1)]<minCell())return false;
  return Math.random()<(t.c/4)*0.82*P.subdivide*Math.pow(P.decay,depth);
}
function processCell(sink,ti,x,y,w,h,depth){
  if(shouldSub(ti,depth,w,h)){
    const N=SUB_N[Math.min(depth,SUB_N.length-1)],sw=w/N,sh=h/N;
    const sub=runWFC(N,N,TILES[ti].e);
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)processCell(sink,sub[r][c],x+c*sw,y+r*sh,sw,sh,depth+1);
  }else emit(sink,ti,x,y,w,h);
}

/* ---- symmetry : none / half / full ---- */
function symmetrize(strokes,mode){
  if(mode==='none')return strokes;
  const cx=FX+FW/2, cy=FY+FH/2;
  const mid=s=>[(s.pts[0][0]+s.pts[s.pts.length-1][0])/2,(s.pts[0][1]+s.pts[s.pts.length-1][1])/2];
  if(mode==='half'){
    const src=strokes.filter(s=>mid(s)[0]<=cx);
    return [...src,...src.map(s=>({pts:s.pts.map(p=>[2*cx-p[0],p[1]])}))];
  }
  const src=strokes.filter(s=>{const m=mid(s);return m[0]<=cx&&m[1]<=cy;});
  const out=[...src];
  for(const s of src){
    out.push({pts:s.pts.map(p=>[2*cx-p[0],p[1]])});
    out.push({pts:s.pts.map(p=>[p[0],2*cy-p[1]])});
    out.push({pts:s.pts.map(p=>[2*cx-p[0],2*cy-p[1]])});
  }
  return out;
}

_mSvg.setAttribute('style','position:absolute;opacity:0;pointer-events:none;width:0;height:0');
document.body.appendChild(_mSvg);
function _samplePath(d,stepNative){const p=document.createElementNS(_svgns,'path');p.setAttribute('d',d);_mSvg.appendChild(p);const L=p.getTotalLength();const n=Math.max(1,Math.ceil(L/stepNative));const out=[];for(let i=0;i<=n;i++){const q=p.getPointAtLength(L*i/n);out.push([q.x,q.y]);}_mSvg.removeChild(p);return out;}
function _parsePoly(d){const m=d.match(/-?\d*\.?\d+/g).map(Number);const out=[];for(let i=0;i+1<m.length;i+=2)out.push([m[i],m[i+1]]);return out;}
// his signature is polyline data → parse exactly; the ka mark is bezier → sample ~1mm
const SIG_LOCAL=SIG.map(d=>_parsePoly(d).map(([px,py])=>({x:SIGL.cx+(px-SIG_CX)*SIG_S, y:SIGL.cy+(py-SIG_CY)*SIG_S})));
const KA_LOCAL =KA.map(d=>_samplePath(d,1/KA_S).map(([kx,ky])=>({x:LOGO.cx+(kx-KA_CX)*KA_S, y:LOGO.cy+(ky-KA_CY)*KA_S})));

/* chain field segments that share endpoints into continuous polylines.
   the WFC emits every guilloche line as disconnected 1-cell stubs; without this
   the plotter does thousands of needless pen up/downs (≈ doubles plot time). */
function mergeStrokes(strokes){
  const eps=1e-3, key=p=>Math.round(p[0]/eps)+','+Math.round(p[1]/eps);
  const used=new Array(strokes.length).fill(false), map=new Map();
  strokes.forEach((s,i)=>{for(const [e,p] of [[0,s.pts[0]],[1,s.pts[s.pts.length-1]]]){const k=key(p);if(!map.has(k))map.set(k,[]);map.get(k).push({i,e});}});
  const out=[];
  for(let i=0;i<strokes.length;i++){
    if(used[i])continue; used[i]=true; let chain=strokes[i].pts.slice();
    for(let go=true;go;){go=false;const ep=chain[chain.length-1];
      for(const c of (map.get(key(ep))||[])){if(used[c.i])continue;
        const jp=c.e===0?strokes[c.i].pts:strokes[c.i].pts.slice().reverse();
        chain=chain.concat(jp.slice(1));used[c.i]=true;go=true;break;}}
    for(let go=true;go;){go=false;const sp=chain[0];
      for(const c of (map.get(key(sp))||[])){if(used[c.i])continue;
        const jp=c.e===1?strokes[c.i].pts:strokes[c.i].pts.slice().reverse();
        chain=jp.slice(0,-1).concat(chain);used[c.i]=true;go=true;break;}}
    out.push({pts:chain});
  }
  return out;
}

/* ================================================================
   compose one note (density × symmetry) into sink at (ox,oy)
================================================================ */
function composeNote(sink,logoAt,times,countStr,utcStr,ox,oy,prm){
  // fat nibs get fewer, coarser cells — rebalance so the face still fills
  const fat=PEN>1.2;
  P.maxDepth=prm.maxDepth;
  P.subdivide=prm.subdivide*(fat?1.4:1);
  P.blankW=fat?Math.max(1,prm.blankW-3):prm.blankW;
  P.cols=penCols();

  const field=[];
  const cols=P.cols, rows=Math.max(3,Math.round(cols*(FH/FW)));
  const cw=FW/cols, ch=FH/rows;
  const inSig=(x,y,S)=>Math.abs(x-S.cx)<=SIG_HW+SIG_PAD&&Math.abs(y-S.cy)<=SIG_HH+SIG_PAD;
  const inVoid=(r,c)=>{const x=FX+(c+.5)*cw,y=FY+(r+.5)*ch;
    if(((x-LOGO.cx)/LOGO.rx)**2+((y-LOGO.cy)/LOGO.ry)**2<=1)return true;   // ka logo
    if(inSig(x,y,SIGL)||inSig(x,y,SIGR))return true;                       // signatures (his + her blank)
    return false;};
  const root=runWFC(rows,cols,null,inVoid);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)processCell(field,root[r][c],FX+c*cw,FY+r*ch,cw,ch,0);

  // symmetry can mirror strokes back into the (off-centre) signature voids — clear them again,
  // then chain the surviving segments into continuous strokes (few pen lifts)
  const weave=mergeStrokes(symmetrize(field,prm.symmetry)
    .filter(s=>!s.pts.some(p=>inSig(p[0],p[1],SIGL)||inSig(p[0],p[1],SIGR))));

  // signature baselines: his (signed on) + hers (left blank), identical
  const ruleHalf=13, ruleY=SIGL.cy+SIG_HH+2.2;
  const rules=[
    {pts:[[SIGL.cx-ruleHalf,ruleY],[SIGL.cx+ruleHalf,ruleY]]},
    {pts:[[SIGR.cx-ruleHalf,ruleY],[SIGR.cx+ruleHalf,ruleY]]},
  ];

  // the frame — inset from the cut edge so a hand-cut wobble never shows
  const frame=[{pts:[[BORDER,BORDER],[NW-BORDER,BORDER],[NW-BORDER,NH-BORDER],[BORDER,NH-BORDER],[BORDER,BORDER]]}];

  // tiny role labels only when the nib can hold them; a 3mm calli nib would flood 2mm type
  const labels=[]; const labY=ruleY+1.5;
  if(PEN<=1.2){
    penText(labels,'ISSUER', SIGL.cx, labY, 2.0, .5,'mid');
    penText(labels,'BEARER', SIGR.cx, labY, 2.0, .5,'mid');
  }

  // bare face: woven field + frame + signatures + role labels (no serial / time / tagline)
  const local=[...weave,...frame,...rules,...labels];

  // exact plot-time for this note via the SAXI motion planner.
  // fat nibs skip the plotted signature — KALA signs by hand in the same pen instead.
  const plotSig=PEN<=1.2;
  const notePaths=[...local.map(s=>s.pts.map(p=>({x:p[0],y:p[1]}))), ...(plotSig?SIG_LOCAL:[]), ...KA_LOCAL];
  const secs=SAXI.duration(notePaths,{joinR:0});   // joinR:0 to match saxi's join setting
  times.push(secs);

  // the note's denomination = the seconds it takes to plot it (time is the only currency)
  const stamp=[];
  if(PEN<=1.2) penText(stamp, String(Math.round(secs)), NW/2, 78.2, 3.2, .9,'mid');
  else         penText(stamp, String(Math.round(secs)), NW/2, 77.4, 4.4, 1.3,'mid');

  for(const s of [...local,...stamp]) sink.push({pts:s.pts.map(p=>[p[0]+ox,p[1]+oy])});
  logoAt.push({ox,oy});
}
/* full-length dashed cut lines on every shared boundary — lay the scale on the
   dashes and make one straight cut; the inset frame hides any wobble.
   dashes read as sheet perforation, and survive every previous cut. */
function dashLine(sink,x1,y1,x2,y2,dash=5,gap=5){
  const dx=x2-x1,dy=y2-y1,L=Math.hypot(dx,dy),ux=dx/L,uy=dy/L;
  for(let d=0;d<L;d+=dash+gap){
    const e=Math.min(d+dash,L);
    sink.push({pts:[[x1+ux*d,y1+uy*d],[x1+ux*e,y1+uy*e]]});
  }
}
function cutLines(sink){
  const y0=MY-4, y1=MY+ROWS*NH+4, x0=MX-4, x1=MX+COLS*NW+4;
  for(let c=0;c<=COLS;c++) dashLine(sink,MX+c*NW,y0,MX+c*NW,y1);
  for(let r=0;r<=ROWS;r++) dashLine(sink,x0,MY+r*NH,x1,MY+r*NH);
}

/* ================================================================
   counter (persists · only goes up)
================================================================ */
function getCount(){return parseInt(localStorage.getItem('kala_count')||'1',10);}
function setCount(n){localStorage.setItem('kala_count',String(n));refreshCounter();}
function fmt(n){const s=String(n).padStart(6,'0');return s[0]+','+s.slice(1,3)+','+s.slice(3);}
function utcNow(){return new Date().toISOString().replace('T',' ').replace(/\..+/,'')+' UTC';}
function refreshCounter(){const el=document.getElementById('serial');if(el)el.textContent='No. '+fmt(getCount());}
function setCounter(){const v=prompt('Set the next KALA number:',getCount());if(v!==null&&!isNaN(parseInt(v,10)))setCount(Math.max(1,parseInt(v,10)));}

/* ================================================================
   build the six  (2 densities × 3 symmetries) into one sheet
================================================================ */
function buildSheet(startCount){
  const strokes=[],logo=[],times=[],meta=[];
  const M=matrix();
  for(let i=0;i<6;i++){
    const {ox,oy}=slot(i);
    composeNote(strokes,logo,times,fmt(startCount+i),utcNow(),ox,oy,M[i]);
    meta.push(`${fmt(startCount+i)}·${M[i].tag}·${M[i].symmetry}`);
  }
  cutLines(strokes);
  // exact whole-sheet time: every path (field + cut dashes + ka + signatures), sorted like saxi
  const allPaths=strokes.map(s=>s.pts.map(p=>({x:p[0],y:p[1]})));
  for(const {ox,oy} of logo){
    if(PEN<=1.2) for(const pl of SIG_LOCAL) allPaths.push(pl.map(p=>({x:p.x+ox,y:p.y+oy})));
    for(const pl of KA_LOCAL)  allPaths.push(pl.map(p=>({x:p.x+ox,y:p.y+oy})));
  }
  const sheetSecs=SAXI.duration(allPaths,{joinR:0});
  return {strokes,logo,times,meta,sheetSecs};
}

/* ---- render ONE note ---- */
const cv=document.getElementById('sheet');
const ctx=cv.getContext('2d');
const PXMM=4;                       // px per mm at 1×
const NOTE_PAPER='#fdfbf3';         // warm plotter stock
const secFmt=s=>{s=Math.round(s);return s<60?s+'s':Math.floor(s/60)+'m '+String(s%60).padStart(2,'0')+'s';};
function drawInto(target,strokes,logoAt){
  target.strokeStyle=INK;target.lineWidth=PEN;target.lineCap='round';target.lineJoin='round';
  for(const s of strokes){target.beginPath();target.moveTo(s.pts[0][0],s.pts[0][1]);
    for(let i=1;i<s.pts.length;i++)target.lineTo(s.pts[i][0],s.pts[i][1]);target.stroke();}
  for(const{ox,oy}of logoAt){target.save();
    target.translate(ox+LOGO.cx,oy+LOGO.cy);target.scale(KA_S,KA_S);target.translate(-KA_CX,-KA_CY);
    target.lineWidth=PEN/KA_S;for(const d of KA)target.stroke(new Path2D(d));target.restore();}
  if(PEN<=1.2) for(const{ox,oy}of logoAt){target.save();             // KALA's signature (left); the bearer's line stays blank
    target.translate(ox+SIGL.cx,oy+SIGL.cy);target.scale(SIG_S,SIG_S);target.translate(-SIG_CX,-SIG_CY);
    target.lineWidth=PEN/SIG_S;for(const d of SIG)target.stroke(new Path2D(d));target.restore();}
}

// the six denominations = 2 densities × 3 symmetries. First load draws the
// highest value; every "issue another" mints one at random — a fresh promise,
// never the same weave twice, always the same signature and the same blank line.
const M=matrix();
let PRM=M.find(m=>m.tag==='II'&&m.symmetry==='full')||M[M.length-1];

function build(){
  PEN=0.5; ARCS=true;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.round(NW*PXMM*dpr); cv.height=Math.round(NH*PXMM*dpr);
  const strokes=[],logo=[],times=[];
  composeNote(strokes,logo,times,fmt(getCount()),utcNow(),0,0,PRM);
  ctx.setTransform(PXMM*dpr,0,0,PXMM*dpr,0,0);
  ctx.fillStyle=NOTE_PAPER; ctx.fillRect(0,0,NW,NH);
  drawInto(ctx,strokes,logo);
  document.getElementById('serial').textContent='No. '+fmt(getCount());
  document.getElementById('denom').textContent=secFmt(times[0])+' of the pen';
  document.getElementById('status').textContent=strokes.length.toLocaleString()+' strokes · '+secFmt(times[0])+' on the plotter';
}
function mint(){ PRM=M[Math.floor(Math.random()*M.length)]; setCount(getCount()+1); build(); }
let _rz; window.addEventListener('resize',()=>{clearTimeout(_rz);_rz=setTimeout(build,160);});

refreshCounter();
build();
</script>
